<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Book</title>
    <link rel="stylesheet" href="book_rooms_style.css">
    <script src="data_rooms.js"></script>
    <script src="book_rooms_script.js"></script>
</head>

<body>
    <div class="container">
        <h1>Book đi nào. Mãi bên nhau bạn nhé</h1>
        <div class="subtitle">
            Top nơi ở sang chảnh đón hè đi sẵn sàng trên Travelcon. Book ngay đi nè
        </div>

        <div class="grid">
            <div class="card">
                <div class="image-wrapper">
                    <img src="room_1.png" id="image_room">
                    <div class="heart">Tim</div>
                </div>    

                <div class="card-content">
                    <div>
                        <span class="ratings">5 star</span>
                        <span class="review">25 reviews</span>
                    </div>
                </div>
                    <div class="hotel-name" id="name-room">Luxstay Villa</div>
                    <div class="room-type" id="description-room">Phòng hai giường đôi</div>
                    <div class="price-label">Giá tiền</div>
                    <div class="price" id="price-room">1.250.000</div>
                    <div class="info">
                        <span>Còn 30 phòng</span>
                        <span>120 đã đặt</span>
                    </div>
                    <a href="#" class="button">Đặt Ngay</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
