<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form input data</title>
    <link rel="stylesheet" href="form_style.css">
    <script src="data.js"></script>
</head>

<body>
    <div class="container">

    <div class="header">
        <h2>Quản lý phòng</h2>
        <div class="button-group">
            <button class="btn btn-show">Hiển Thị</button>
            <button class="btn btn-add">Thêm mới phòng</button>
        </div>
    </div>

    <hr>

    <form>
        <div class="form-row">
            <div class="form-group">
                <label>Tên phòng</label>
                <input type="text" placeholder="Tên phòng">
            </div>

            <div class="form-group">
                <label>Mô tả phòng</label>
                <input type="text" placeholder="Mô tả phòng">
            </div>

            <div class="form-group">
                <label>Giá</label>
                <input type="number" placeholder="Giá phòng">
            </div>
        </div>
    </form>
    </div>
</body>
